<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تعديل الخبر</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            direction: rtl;
            padding:20px;
        }

        form{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 15px;
            background:green;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

<h1>✏️ تعديل الخبر</h1>

<form method="POST">

    <input type="text" name="title" value="{{ news[1] }}">

    <textarea name="content">{{ news[2] }}</textarea>

    <button type="submit">حفظ التعديل</button>

</form>

</body>
</html>
