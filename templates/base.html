<!DOCTYPE html>
<html>
<head>
    <title>News Website</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .navbar {
            background: #111;
        }

        .navbar a {
            color: white !important;
            margin-right: 10px;
        }

        .news-card {
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px #ddd;
        }

        .news-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .container {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-3">

    <a class="navbar-brand" href="/">📰 News</a>

    <div class="ms-auto">

        <a href="/" class="btn btn-light btn-sm">Home</a>

        {% if session.get('admin') %}
            <a href="/secret-admin" class="btn btn-warning btn-sm">Admin Panel</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="/login" class="btn btn-warning btn-sm">Admin Login</a>
        {% endif %}

    </div>

</nav>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
