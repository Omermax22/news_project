<!DOCTYPE html>
<html>
<head>
    <title>News Project</title>
</head>
<body>

<h1>📰 الأخبار</h1>
<a href="/add">➕ إضافة خبر</a>

{% for n in news %}
<div style="border:1px solid #ccc; margin:10px; padding:10px;">
    <h2>{{ n[1] }}</h2>
    <p>{{ n[2] }}</p>

    {% if n[3] %}
    <img src="/{{ n[3] }}" width="300">
    {% endif %}

    <p>{{ n[4] }}</p>

    <a href="/edit/{{ n[0] }}">تعديل</a>
    <a href="/delete/{{ n[0] }}">حذف</a>
</div>
{% endfor %}

</body>
</html>
