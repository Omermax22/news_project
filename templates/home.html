<!DOCTYPE html>
<html lang="ar">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>موقع الأخبار</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            direction:rtl;
            margin:0;
        }

        .navbar{
            background:#111;
            color:white;
            padding:15px;
        }

        .navbar h1{
            margin:0;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:auto;
            margin-top:20px;
        }

        .search-box{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .search-box input{
            width:80%;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        .search-box button{
            padding:12px 20px;
            border:none;
            background:#111;
            color:white;
            border-radius:10px;
            cursor:pointer;
        }

        .card{
            background:white;
            margin-bottom:20px;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .content{
            padding:20px;
        }

        .content h2{
            margin-top:0;
        }

        .content p{
            color:#555;
            line-height:1.8;
        }

        .stats{
            margin-top:15px;
            color:#666;
        }

        .read-more{
            display:inline-block;
            margin-top:15px;
            background:#111;
            color:white;
            padding:10px 20px;
            border-radius:5px;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <h1>
            📰 موقع الأخبار
        </h1>

    </div>

    <div class="container">

        <!-- Search -->

        <div class="search-box">

            <form action="/search">

                <input
                    type="text"
                    name="q"
                    placeholder="ابحث داخل الأخبار..."
                    required
                >

                <button type="submit">
                    🔍 بحث
                </button>

            </form>

        </div>

        <!-- News -->

        {% for n in news %}

        <div class="card">

            {% if n[3] %}

            <img src="/{{ n[3] }}">

            {% endif %}

            <div class="content">

                <h2>
                    {{ n[1] }}
                </h2>

                <p>
                    {{ n[2][:200] }}...
                </p>

                <div class="stats">

                    👁️ {{ n[4] }}
                    |
                    ❤️ {{ n[5] }}

                </div>

                <a
                    class="read-more"
                    href="/news/{{ n[0] }}"
                >
                    قراءة الخبر
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</body>
</html>
