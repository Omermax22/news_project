<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الأخبار</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            margin:0;
            direction: rtl;
        }

        .header{
            background:#111;
            color:#fff;
            padding:15px;
            text-align:center;
        }

        .container{
            width:90%;
            margin:auto;
            padding:20px;
        }

        form{
            background:#fff;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 15px;
            background:#111;
            color:#fff;
            border:none;
            cursor:pointer;
        }

        .news{
            background:#fff;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
        }

        .btn{
            display:inline-block;
            padding:8px 12px;
            background:#111;
            color:#fff;
            text-decoration:none;
            margin-top:10px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="header">
    📰 موقع الأخبار
</div>

<div class="container">

    <!-- إضافة خبر -->
    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="عنوان الخبر">
        <textarea name="content" placeholder="محتوى الخبر"></textarea>
        <button type="submit">نشر الخبر</button>
    </form>

    <hr>

    <!-- عرض الأخبار -->
    {% for n in news %}
    <div class="news">
        <h3>{{ n[1] }}</h3>
        <p>{{ n[2] }}</p>
    </div>
    {% endfor %}

</div>

</body>
</html>
