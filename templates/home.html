<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الإخباري</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            margin:0;
            padding:0;
            direction: rtl;
        }

        .header{
            background:#111;
            color:white;
            padding:20px;
            text-align:center;
        }

        .add-btn{
            display:inline-block;
            margin-top:10px;
            padding:10px 20px;
            background:red;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:20px;
        }

        .card{
            background:white;
            border-radius:10px;
            overflow:hidden;
            margin-bottom:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .content{
            padding:15px;
        }

        .content h2{
            margin:0;
            margin-bottom:10px;
        }

        .content p{
            color:#555;
            line-height:1.7;
        }

        .date{
            color:gray;
            font-size:14px;
            margin-top:10px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>📰 موقعي الإخباري</h1>

        <a href="/add" class="add-btn">
            ➕ إضافة خبر
        </a>
    </div>

    <div class="container">

        {% for item in news %}

        <div class="card">

            {% if item[3] %}
            <img src="/{{ item[3] }}">
            {% endif %}

            <div class="content">

                <h2>{{ item[1] }}</h2>

                <p>{{ item[2] }}</p>

                <div class="date">
                    📅 {{ item[4] }}
                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</body>
</html>
