<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الأخبار</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            margin:0;
            direction: rtl;
        }

        .header{
            background:#111;
            color:#fff;
            padding:15px;
            text-align:center;
        }

        .container{
            width:90%;
            margin:auto;
            padding:20px;
        }

        .news{
            background:#fff;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
        }

        img{
            max-width:100%;
            border-radius:10px;
            margin-top:10px;
        }

        a{
            display:inline-block;
            margin-top:10px;
            padding:8px 12px;
            background:#111;
            color:#fff;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="header">
    📰 موقع الأخبار
</div>

<div class="container">

    <!-- عرض الأخبار -->
    {% for n in news %}
    <div class="news">

        <h2>{{ n[1] }}</h2>

        <p>{{ n[2] }}</p>

        {% if n[3] %}
            <img src="/{{ n[3] }}">
        {% endif %}

        <a href="/news/{{ n[0] }}">📖 اقرأ المزيد</a>

    </div>
    {% endfor %}

</div>

</body>
</html>
